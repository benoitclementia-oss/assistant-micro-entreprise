name: CI — Tests & Qualité

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────
  # Lint Python avec ruff
  # ──────────────────────────────────────────
  lint:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  # ──────────────────────────────────────────
  # Tests unitaires + couverture
  # ──────────────────────────────────────────
  test:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt

      - name: Lancer les tests
        env:
          LEGIFRANCE_CLIENT_ID: test_id
          LEGIFRANCE_CLIENT_SECRET: test_secret
          OPENAI_API_KEY: sk-test-key
          QDRANT_URL: http://localhost:6333
        run: pytest

      - name: Conserver les rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 90

  # ──────────────────────────────────────────
  # Vérification de types
  # ──────────────────────────────────────────
  typecheck:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: mypy agent/ api/ scripts/ --ignore-missing-imports
        continue-on-error: true

  # ──────────────────────────────────────────
  # Lint Frontend
  # ──────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend (ESLint + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
